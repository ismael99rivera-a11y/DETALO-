<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Detalo — Gestión Vacacional</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
:root{
  --res-bg:#bbf7d0;--res-fg:#14532d;--res-bdr:#22c55e;
  --blk-bg:#fecaca;--blk-fg:#7f1d1d;--blk-bdr:#ef4444;
  --ical-bg:#ffedd5;--ical-fg:#92400e;--ical-bdr:#f97316;
  --cap-bg:#f3e8ff;--cap-fg:#6b21a8;--cap-bdr:#a855f7;
  --free-bg:#f0fdf4;--free-fg:#15803d;--free-bdr:#86efac;
  --cell-w:38px;--cell-h:36px;--prop-w:175px;
}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── HEADER ── */
.app-hdr{
  height:60px;background:#0f172a;color:#fff;
  display:flex;align-items:center;padding:0 20px;gap:14px;
  flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.4);z-index:200
}
.logo{font-size:1.4rem;font-weight:800;letter-spacing:-.5px;color:#38bdf8}
.logo span{color:#fff}
.legend{display:flex;gap:14px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:.72rem;color:#94a3b8}
.leg-dot{width:10px;height:10px;border-radius:2px}
.leg-dot.r{background:#22c55e}.leg-dot.b{background:#ef4444}.leg-dot.ic{background:#f97316}.leg-dot.cap{background:#a855f7}.leg-dot.free{background:#22c55e;border:1px dashed #15803d}.leg-dot.a{background:#475569;opacity:.4}
.month-nav{display:flex;align-items:center;gap:10px;margin-left:auto}
.nav-btn{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:#fff;width:30px;height:30px;border-radius:6px;cursor:pointer;
  font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:background .15s
}
.nav-btn:hover{background:rgba(255,255,255,.22)}
.month-lbl{font-size:.95rem;font-weight:600;min-width:170px;text-align:center;text-transform:capitalize}
.btn-hoy{
  background:#0ea5e9;border:none;color:#fff;padding:6px 14px;
  border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:600;transition:background .15s
}
.btn-hoy:hover{background:#0284c7}

/* Sync chip */
.sync-chip{
  display:flex;align-items:center;gap:5px;padding:4px 10px;
  border-radius:20px;font-size:.72rem;font-weight:600;cursor:default;
  white-space:nowrap;border:1px solid transparent;transition:all .3s
}
.sync-chip.idle  {background:rgba(255,255,255,.07);color:#64748b;border-color:rgba(255,255,255,.1)}
.sync-chip.ok    {background:rgba(34,197,94,.15);color:#4ade80;border-color:rgba(34,197,94,.3)}
.sync-chip.err   {background:rgba(239,68,68,.15);color:#f87171;border-color:rgba(239,68,68,.3)}
.sync-chip.running{background:rgba(14,165,233,.15);color:#38bdf8;border-color:rgba(14,165,233,.3)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite}

/* Settings button */
.btn-settings{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  color:#94a3b8;padding:5px 12px;border-radius:6px;cursor:pointer;
  font-size:.78rem;font-weight:600;transition:all .15s;display:flex;align-items:center;gap:6px
}
.btn-settings:hover{background:rgba(255,255,255,.18);color:#e2e8f0}

/* ── CALENDAR SHELL ── */
.cal-shell{flex:1;overflow:auto;position:relative}
.cal-shell::-webkit-scrollbar{width:7px;height:7px}
.cal-shell::-webkit-scrollbar-track{background:#e2e8f0}
.cal-shell::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:4px}
.cal-wrap{min-width:max-content}

/* ── DAY HEADER ── */
.day-hdr-row{display:flex;position:sticky;top:0;z-index:90;background:#f8fafc;border-bottom:2px solid #cbd5e1}
.corner{width:var(--prop-w);min-width:var(--prop-w);flex-shrink:0;position:sticky;left:0;z-index:95;background:#f8fafc;border-right:2px solid #cbd5e1}
.day-th{width:var(--cell-w);min-width:var(--cell-w);height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.65rem;color:#64748b;border-right:1px solid #e2e8f0;flex-shrink:0}
.day-th .dn{font-size:.78rem;font-weight:700}
.day-th.wknd{background:#fafafe}
.day-th.today-col .dn{color:#0ea5e9}
.day-th.today-col{background:#f0f9ff}

/* ── DESTINATION HEADER ── */
.dest-hdr{display:flex;background:#1e293b}
.dest-lbl{width:var(--prop-w);min-width:var(--prop-w);flex-shrink:0;height:26px;display:flex;align-items:center;padding:0 12px;font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#7dd3fc;background:#1e293b;position:sticky;left:0;z-index:70;border-right:2px solid #0f172a}
.dest-fill{flex:1;background:#1e293b;border-bottom:1px solid #0f172a}

/* ── GROUP SUB-HEADER ── */
.grp-hdr{display:flex;background:#293548}
.grp-lbl{width:var(--prop-w);min-width:var(--prop-w);flex-shrink:0;height:21px;display:flex;align-items:center;padding:0 16px;font-size:.67rem;font-weight:600;font-style:italic;color:#7dd3fc;background:#293548;position:sticky;left:0;z-index:60;border-right:2px solid #1e293b}
.grp-fill{flex:1;background:#293548;border-bottom:1px solid #1e293b}
.grp-sep{height:3px;background:#dde3ea;border-bottom:1px solid #c8d0db}

/* ── PROPERTY ROW ── */
.prop-row{display:flex;border-bottom:1px solid #e9edf2}
.prop-name{width:var(--prop-w);min-width:var(--prop-w);flex-shrink:0;height:var(--cell-h);display:flex;align-items:center;padding:0 10px 0 14px;font-size:.78rem;font-weight:500;color:#475569;background:#fcfcfd;border-right:2px solid #cbd5e1;position:sticky;left:0;z-index:50;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .1s}
.prop-row:hover .prop-name{background:#f0f9ff}

/* ── DAY CELL ── */
.dc{width:var(--cell-w);min-width:var(--cell-w);height:var(--cell-h);flex-shrink:0;border-right:1px solid #f1f5f9;position:relative;cursor:pointer;background:#fff;overflow:hidden;transition:background .1s}
.dc:hover{background:#f0f9ff}
.dc.wknd{background:#fafafe}.dc.wknd:hover{background:#f0f4ff}
.dc.today-col{background:#f0f9ff}
.dc.today-col::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#0ea5e9}

/* ── BOOKING CELLS ── */
.dc.res{background:var(--res-bg)}.dc.res:hover{background:#86efac}
.dc.blk{background:var(--blk-bg)}.dc.blk:hover{background:#fca5a5}
.dc.icalblk{background:var(--ical-bg)}.dc.icalblk:hover{background:#fdba74}
.dc.capblk{background:var(--cap-bg)}.dc.capblk:hover{background:#e9d5ff}
.dc.freebk{background:var(--free-bg);border-style:dashed!important}.dc.freebk:hover{background:#dcfce7}

.dc.bk-start{border-left:3px solid}
.dc.res.bk-start{border-left-color:var(--res-bdr)}
.dc.blk.bk-start{border-left-color:var(--blk-bdr)}
.dc.icalblk.bk-start{border-left-color:var(--ical-bdr)}
.dc.capblk.bk-start{border-left-color:var(--cap-bdr)}
.dc.freebk.bk-start{border-left-color:var(--free-bdr)}
.dc.bk-end{border-right:2px solid}
.dc.res.bk-end{border-right-color:var(--res-bdr)}
.dc.blk.bk-end{border-right-color:var(--blk-bdr)}
.dc.icalblk.bk-end{border-right-color:var(--ical-bdr)}
.dc.capblk.bk-end{border-right-color:var(--cap-bdr)}
.dc.freebk.bk-end{border-right-color:var(--free-bdr)}

.bk-label{position:absolute;top:50%;left:5px;right:3px;transform:translateY(-50%);font-size:.66rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none;line-height:1}
.bk-label.r{color:var(--res-fg)}.bk-label.b{color:var(--blk-fg)}.bk-label.ic{color:var(--ical-fg)}.bk-label.cap{color:var(--cap-fg)}.bk-label.free{color:var(--free-fg)}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.65);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.overlay.on{display:flex}
.mbox{background:#fff;border-radius:14px;box-shadow:0 24px 64px rgba(0,0,0,.35);width:500px;max-width:calc(100vw - 32px);max-height:calc(100vh - 60px);overflow-y:auto;animation:pop .18s ease}
@keyframes pop{from{opacity:0;transform:translateY(-14px) scale(.97)}to{opacity:1;transform:none}}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #e2e8f0}
.mtitle{font-size:1rem;font-weight:700;color:#0f172a}
.mclose{background:none;border:none;cursor:pointer;color:#94a3b8;font-size:1.3rem;line-height:1;padding:4px 6px;border-radius:5px;transition:all .15s}
.mclose:hover{color:#475569;background:#f1f5f9}
.mbody{padding:22px}
.mfoot{padding:14px 22px;border-top:1px solid #e2e8f0;display:flex;gap:10px;justify-content:flex-end}

/* ── DETAIL VIEW ── */
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 13px;border-radius:20px;font-size:.78rem;font-weight:700;margin-bottom:18px}
.badge.r{background:var(--res-bg);color:var(--res-fg)}
.badge.b{background:var(--blk-bg);color:var(--blk-fg)}
.badge.ic{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
.badge.cap{background:#faf5ff;color:var(--cap-fg);border:1px solid #e9d5ff}
.badge.free{background:var(--free-bg);color:var(--free-fg);border:1px dashed var(--free-bdr)}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px 20px}
.di label{display:block;font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:#94a3b8;margin-bottom:3px}
.di .val{font-size:.88rem;font-weight:600;color:#1e293b}
.di.full{grid-column:1/-1}

/* ── FORM ── */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:.78rem;font-weight:600;color:#475569;margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 10px;font-size:.88rem;color:#1e293b;background:#fff;transition:border-color .15s,box-shadow .15s;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#0ea5e9;box-shadow:0 0 0 3px rgba(14,165,233,.12)}
.fg textarea{resize:vertical;min-height:66px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.type-sel{display:flex;gap:10px}
.tbtn{flex:1;padding:8px 6px;border-radius:8px;border:2px solid #e2e8f0;background:#fff;cursor:pointer;font-size:.83rem;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.tbtn.r{color:var(--res-fg)}.tbtn.b{color:var(--blk-fg)}
.tbtn.on.r{background:var(--res-bg);border-color:var(--res-bdr)}
.tbtn.on.b{background:var(--blk-bg);border-color:var(--blk-bdr)}

/* ── BUTTONS ── */
.btn{padding:9px 18px;border-radius:8px;border:none;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .15s}
.btn-pri{background:#0ea5e9;color:#fff}.btn-pri:hover{background:#0284c7}
.btn-del{background:#ef4444;color:#fff}.btn-del:hover{background:#dc2626}
.btn-sec{background:#f1f5f9;color:#475569}.btn-sec:hover{background:#e2e8f0}
.btn-warn{background:#f59e0b;color:#fff}.btn-warn:hover{background:#d97706}
.btn-ghost{background:#f0fdf4;color:#15803d;border:1px solid #86efac}.btn-ghost:hover{background:#dcfce7}
.req{color:#ef4444}

/* ── SETTINGS MODAL ── */
.settings-box{width:760px}
.stabs{display:flex;border-bottom:2px solid #e2e8f0;padding:0 22px;margin:-22px -22px 20px}
.stab{padding:12px 18px;border:none;background:none;font-size:.85rem;font-weight:600;color:#94a3b8;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s}
.stab.on{color:#0ea5e9;border-bottom-color:#0ea5e9}

/* Sources list */
.src-add{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:16px;margin-bottom:20px}
.src-add h4{font-size:.8rem;font-weight:700;color:#475569;margin-bottom:12px}
.src-list{display:flex;flex-direction:column;gap:8px}
.src-item{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px}
.si-prop{font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:4px;background:#e0f2fe;color:#0369a1;white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis}
.si-plat{font-size:.72rem;font-weight:600;padding:2px 8px;border-radius:4px;background:#f0fdf4;color:#166534;white-space:nowrap}
.si-url{flex:1;font-size:.72rem;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:monospace}
.si-ok{font-size:.72rem;color:#16a34a;white-space:nowrap}
.si-err{font-size:.72rem;color:#dc2626;white-space:nowrap;cursor:help}
.si-pend{font-size:.72rem;color:#94a3b8;white-space:nowrap}
.src-empty{text-align:center;color:#94a3b8;padding:24px;font-size:.85rem;background:#f8fafc;border:1px dashed #e2e8f0;border-radius:8px}

/* Output table */
.out-tbl{width:100%;border-collapse:collapse;font-size:.82rem}
.out-tbl th{text-align:left;padding:8px 10px;font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;border-bottom:2px solid #e2e8f0;white-space:nowrap}
.out-tbl td{padding:7px 10px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
.out-tbl .url-txt{font-family:monospace;font-size:.7rem;color:#64748b;display:block;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-copy{background:none;border:1px solid #e2e8f0;padding:3px 9px;border-radius:5px;cursor:pointer;font-size:.72rem;color:#64748b;transition:all .15s;white-space:nowrap}
.btn-copy:hover{background:#f0f9ff;border-color:#7dd3fc;color:#0369a1}
.btn-copy.ok{background:#f0fdf4;border-color:#86efac;color:#16a34a}

/* Settings footer */
.mfoot-sb{padding:14px 22px;border-top:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;gap:10px}
.s-sync-info{font-size:.78rem;color:#64748b}

/* Unit selector */
.unit-sel{display:flex;gap:5px}
.ubtn{width:34px;height:32px;border-radius:7px;border:1.5px solid #e2e8f0;background:#fff;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .15s;color:#64748b}
.ubtn:hover{border-color:#0ea5e9;color:#0284c7}
.ubtn.on{background:#0ea5e9;border-color:#0284c7;color:#fff}
.si-units{font-size:.7rem;font-weight:700;padding:2px 7px;border-radius:4px;background:#eff6ff;color:#1d4ed8;white-space:nowrap;flex-shrink:0}
/* Multi-URL display in source list */
.si-url-stack{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:2px}
/* Small hint inside form labels */
.unit-url-note{font-size:.68rem;font-weight:400;color:#94a3b8;margin-left:4px}

/* ── DRAG SELECT ── */
.dc.drag-sel{background:#bae6fd!important;outline:1px solid #0ea5e9;z-index:1}
.dc.drag-sel.res,.dc.drag-sel.blk,.dc.drag-sel.icalblk{opacity:.75}
.cal-shell.dragging{user-select:none;cursor:col-resize}

/* ── SYNC BTN HEADER ── */
.btn-sync{background:rgba(14,165,233,.18);border:1px solid rgba(14,165,233,.35);color:#7dd3fc;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.78rem;font-weight:600;transition:all .15s;white-space:nowrap}
.btn-sync:hover{background:rgba(14,165,233,.35);border-color:rgba(14,165,233,.6);color:#fff}
.btn-sync:disabled{opacity:.5;cursor:default}

/* ── MULTI-BLOCK MODAL ── */
.mb-prop-list{max-height:220px;overflow-y:auto;border:1.5px solid #e2e8f0;border-radius:8px;padding:6px 10px}
.mb-dest-lbl{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;padding:6px 2px 2px;margin-top:2px}
.mb-dest-lbl:first-child{padding-top:2px;margin-top:0}
.mb-prop-row{display:flex;align-items:center;gap:7px;padding:3px 4px;border-radius:5px;cursor:pointer}
.mb-prop-row:hover{background:#f1f5f9}
.mb-prop-row input[type=checkbox]{accent-color:#0ea5e9;cursor:pointer;width:14px;height:14px;flex-shrink:0}
.mb-prop-row label{font-size:.82rem;cursor:pointer;flex:1;color:#1e293b}
.mb-grp-lbl{font-size:.7rem;color:#94a3b8}

/* ── SOURCES AGRUPADAS POR PROPIEDAD ── */
.src-prop-block{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin-bottom:10px}
.src-prop-hdr{background:#f0f9ff;padding:8px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #dbeafe}
.src-phdr-name{font-size:.82rem;font-weight:700;color:#0369a1}
.src-phdr-dest{font-size:.72rem;color:#64748b;margin-left:auto}
.src-prop-rows{display:flex;flex-direction:column}
.src-item{border-bottom:1px solid #f1f5f9;padding:9px 12px;display:flex;align-items:center;gap:8px}
.src-item:last-child{border-bottom:none}
.src-missing-row{display:flex;flex-wrap:wrap;gap:5px;padding:5px 12px 10px}
.src-missing-pill{font-size:.69rem;color:#94a3b8;border:1px dashed #cbd5e1;border-radius:12px;padding:2px 10px}
</style>
</head>
<body>
<div id="app">
  <header class="app-hdr">
    <div class="logo">Deta<span>lo</span></div>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot r"></div>Reserva</div>
      <div class="leg-item"><div class="leg-dot b"></div>Bloqueo</div>
      <div class="leg-item"><div class="leg-dot ic"></div>iCal</div>
      <div class="leg-item"><div class="leg-dot cap"></div>Capacidad</div>
      <div class="leg-item"><div class="leg-dot a"></div>Disponible</div>
    </div>
    <div id="syncChip" class="sync-chip idle" title="Estado de sincronización iCal">⏸ Sin fuentes</div>
    <button class="btn-sync" id="btnSyncHdr" title="Sincronizar fuentes iCal ahora">🔄 Sync</button>
    <button class="btn-settings" id="btnSettings">⚙ Sincronización</button>
    <div class="month-nav">
      <button class="nav-btn" id="btnPrev">&#8249;</button>
      <div class="month-lbl" id="monthLbl"></div>
      <button class="nav-btn" id="btnNext">&#8250;</button>
      <button class="btn-hoy" id="btnHoy">Hoy</button>
    </div>
  </header>

  <div class="cal-shell" id="calShell">
    <div class="cal-wrap" id="calWrap">
      <div style="padding:40px;text-align:center;color:#94a3b8;font-size:.9rem">Cargando…</div>
    </div>
  </div>
</div>

<!-- ═══ MODAL VER RESERVA ═══ -->
<div class="overlay" id="viewOv">
  <div class="mbox">
    <div class="mhdr">
      <div class="mtitle" id="viewTitle">Detalle</div>
      <button class="mclose" id="viewClose">&#215;</button>
    </div>
    <div class="mbody" id="viewBody"></div>
    <div class="mfoot" id="viewFoot">
      <button class="btn btn-warn" id="btnLiberar" style="display:none">Liberar fechas</button>
      <button class="btn btn-del" id="btnDel">Eliminar</button>
      <button class="btn btn-sec" id="btnViewCerrar">Cerrar</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL CREAR RESERVA ═══ -->
<div class="overlay" id="formOv">
  <div class="mbox">
    <div class="mhdr">
      <div class="mtitle" id="formTitle">Nueva Reserva</div>
      <button class="mclose" id="formClose">&#215;</button>
    </div>
    <div class="mbody">
      <form id="bkForm" novalidate>
        <div class="fg">
          <label>Tipo</label>
          <div class="type-sel">
            <button type="button" class="tbtn r on" data-t="reservation">🟢 Reserva</button>
            <button type="button" class="tbtn b" data-t="block">🔴 Bloqueo</button>
          </div>
          <input type="hidden" id="fType" value="reservation">
        </div>
        <div id="guestSec">
          <div class="frow">
            <div class="fg"><label>Nombre huésped <span class="req">*</span></label><input type="text" id="fName" placeholder="Nombre completo"></div>
            <div class="fg"><label>Teléfono</label><input type="tel" id="fPhone" placeholder="+52 33 0000 0000"></div>
          </div>
        </div>
        <div class="frow">

<script>

// ═══════════════════════════════════════════
const DESTINATIONS = ['Tequila','Tapalpa','Mazamitla','Nuevo Vallarta','Guadalajara','San Pedro Tesistán'];

];

const DAY_NAMES   = ['Do','Lu','Ma','Mi','Ju','Vi','Sá'];
const MONTH_NAMES = ['enero','febrero','marzo','abril','mayo','junio',
  'julio','agosto','septiembre','octubre','noviembre','diciembre'];

// ═══════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════
let bookings  = [];
let sources   = [];
let curY, curM;
let activeId  = null;
let formType  = 'reservation';
let settingsTab = 'import';
let _lastSyncRun = null;   // para detectar syncs automáticos y refrescar el calendario
// Drag-to-select
let drag = { on:false, startDs:null, curDs:null, startPid:null, curPid:null, moved:false };
let suppressClick = false;

// ═══════════════════════════════════════════
// UTILIDADES
// ═══════════════════════════════════════════
const pad2        = n => String(n).padStart(2,'0');
const dStr        = (y,m,d) => `${y}-${pad2(m+1)}-${pad2(d)}`;
const daysInMonth = (y,m) => new Date(y,m+1,0).getDate();
const dayOfWeek   = (y,m,d) => new Date(y,m,d).getDay();

function isToday(y,m,d){ const n=new Date(); return n.getFullYear()===y&&n.getMonth()===m&&n.getDate()===d; }
function isWeekend(y,m,d){ const w=dayOfWeek(y,m,d); return w===0||w===6; }
function fmtDate(s){ if(!s)return'—'; const[y,m,d]=s.split('-'); return`${d}/${m}/${y}`; }
function fmtMoney(n){ return n?new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN'}).format(n):'—'; }
function nightCount(s,e){ return(!s||!e)?0:Math.round((new Date(e)-new Date(s))/864e5); }
function fmtTime(iso){ return iso?new Date(iso).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}):''; }

// ═══════════════════════════════════════════
// API
// ═══════════════════════════════════════════
async function api(method, path, body) {
  const opts = { method, headers:{} };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(`${r.status} ${await r.text()}`);
  return r.json();
}

async function refreshBookings() {
  bookings = await api('GET', '/api/bookings');
}

// ═══════════════════════════════════════════
// LÓGICA DE RESERVAS
// ═══════════════════════════════════════════
function bkForCell(pid,y,m,d){
  const ds=dStr(y,m,d);
  return bookings.find(b=>b.pid===pid&&ds>=b.s&&ds<=b.e)||null;
}
function isFirst(bk,y,m,d){
  const ds=dStr(y,m,d),ms=dStr(y,m,1);
  return bk.s===ds||(d===1&&bk.s<ms);
}
function isLast(bk,y,m,d){
  const ds=dStr(y,m,d),total=daysInMonth(y,m),me=dStr(y,m,total);
  return bk.e===ds||(d===total&&bk.e>me);
}
function hasOverlap(pid,s,e,excId){
  return bookings.some(b=>{
    if(b.pid!==pid) return false;
    if(excId&&b.id===excId) return false;
    if(b.type==='capacity-block') return false; // los manuales pueden sobreponerse
    return s<=b.e&&e>=b.s;
  });
}

// ═══════════════════════════════════════════
// RENDER CALENDARIO
// ═══════════════════════════════════════════
function renderCal(){
  const total=daysInMonth(curY,curM);
  let h='';

  h+=`<div class="day-hdr-row"><div class="corner"></div>`;
  for(let d=1;d<=total;d++){
    const wk=isWeekend(curY,curM,d),tod=isToday(curY,curM,d);
    h+=`<div class="day-th${wk?' wknd':''}${tod?' today-col':''}">
      <span class="dn">${d}</span><span>${DAY_NAMES[dayOfWeek(curY,curM,d)]}</span></div>`;
  }
  h+='</div>';

  DESTINATIONS.forEach(dest=>{
    const props=PROPS.filter(p=>p.dest===dest);
    h+=`<div class="dest-hdr"><div class="dest-lbl">${dest}</div><div class="dest-fill"></div></div>`;
    let curGrp=undefined;
    props.forEach(prop=>{
      if(prop.group!==curGrp){
        if(curGrp&&!prop.group) h+=`<div class="grp-sep"></div>`;
        curGrp=prop.group;
        if(prop.group) h+=`<div class="grp-hdr"><div class="grp-lbl">${prop.group}</div><div class="grp-fill"></div></div>`;
      }
      h+=`<div class="prop-row"><div class="prop-name" title="${prop.name}">${prop.name}</div>`;
      for(let d=1;d<=total;d++){
        const bk=bkForCell(prop.id,curY,curM,d);
        const wk=isWeekend(curY,curM,d),tod=isToday(curY,curM,d);
        const ds=dStr(curY,curM,d);
        let cls='dc',lbl='';
        if(wk) cls+=' wknd';
        if(tod) cls+=' today-col';
        if(bk){
          const isRes=bk.type==='reservation';
          const isIcal=bk.type==='ical-block';
          const isCap=bk.type==='capacity-block';
          const isFree=bk.type==='ical-override';
          cls+=isRes?' res':isIcal?' icalblk':isCap?' capblk':isFree?' freebk':' blk';
          if(isFirst(bk,curY,curM,d)) cls+=' bk-start';
          if(isLast(bk,curY,curM,d))  cls+=' bk-end';
          if(isFirst(bk,curY,curM,d)){
            const txt=isRes?(bk.name||'Sin nombre'):isIcal?(bk.platform?`🔗 ${bk.platform}`:'iCal'):isCap?'Capacidad':isFree?'Libre':'Bloqueado';
            const cc=isRes?'r':isIcal?'ic':isCap?'cap':isFree?'free':'b';
            lbl=`<span class="bk-label ${cc}">${txt}</span>`;
          }
          h+=`<div class="${cls}" data-bk="${bk.id}" data-ds="${ds}" data-pid="${prop.id}">${lbl}</div>`;
        } else {
          h+=`<div class="${cls}" data-ds="${ds}" data-pid="${prop.id}"></div>`;
        }
      }
      h+='</div>';
    });
  });

  document.getElementById('calWrap').innerHTML=h;
  document.querySelectorAll('.dc').forEach(el=>{
    el.addEventListener('click',()=>{
      if(suppressClick) return;
      const bkId=el.dataset.bk;
      if(bkId) openView(bkId);
      else     openForm(el.dataset.pid, el.dataset.ds);
    });
  });
}

// ═══════════════════════════════════════════
// MODAL VER
// ═══════════════════════════════════════════
function openView(id){
  activeId=id;
  const bk=bookings.find(b=>b.id===id);
  if(!bk) return;
  const prop=PROPS.find(p=>p.id===bk.pid);
  const isRes=bk.type==='reservation';
  const isIcal=bk.type==='ical-block';
  const isCap=bk.type==='capacity-block';
  const isFree=bk.type==='ical-override';
  const nights=nightCount(bk.s,bk.e);
  document.getElementById('viewTitle').textContent=isRes?'Detalle de Reserva':isIcal?'Bloqueo iCal':isCap?'Bloqueo por Capacidad':isFree?'Override — Fechas libres':'Detalle de Bloqueo';
  const badge=isRes?'🟢 Reserva':isIcal?'🔗 Importado de iCal':isCap?'🔒 Bloqueo por capacidad':isFree?'🟩 Fechas liberadas (override)':'🔴 Bloqueo por dueño';
  const bc=isRes?'r':isIcal?'ic':isCap?'cap':isFree?'free':'b';
  let h=`<div class="badge ${bc}">${badge}</div><div class="dgrid">
    <div class="di full"><label>Propiedad</label>
      <div class="val">${prop?prop.name:'—'}${prop&&prop.group?' · '+prop.group:''} · ${prop?prop.dest:''}</div></div>`;
  if(isRes) h+=`<div class="di"><label>Huésped</label><div class="val">${bk.name||'—'}</div></div>
    <div class="di"><label>Teléfono</label><div class="val">${bk.phone||'—'}</div></div>`;
  if(isIcal) h+=`<div class="di"><label>Fuente</label><div class="val">${bk.platform||'iCal'}</div></div>
    <div class="di"><label>Sincronizado</label><div class="val">${fmtTime(bk.syncedAt)||'—'}</div></div>`;
  if(isCap) h+=`<div class="di full"><label>Motivo</label><div class="val">${bk.notes||'Bloqueo automático por capacidad'}</div></div>
    <div class="di"><label>Calculado</label><div class="val">${fmtTime(bk.syncedAt)||'—'}</div></div>`;
  if(isFree) h+=`<div class="di full"><label>Efecto</label><div class="val">Suprime el bloqueo iCal en el calendario de salida hasta el próximo sync</div></div>`;
  h+=`<div class="di"><label>Entrada</label><div class="val">${fmtDate(bk.s)}</div></div>
    <div class="di"><label>Salida</label><div class="val">${fmtDate(bk.e)}</div></div>
    <div class="di"><label>Noches</label><div class="val">${nights} noche${nights!==1?'s':''}</div></div>`;
  if(isRes) h+=`<div class="di"><label>Ingreso bruto</label><div class="val">${fmtMoney(bk.income)}</div></div>
    <div class="di"><label>Plataforma</label><div class="val">${bk.platform||'—'}</div></div>`;
  if(bk.notes&&!isFree) h+=`<div class="di full"><label>Notas</label><div class="val">${bk.notes}</div></div>`;
  h+='</div>';
  document.getElementById('viewBody').innerHTML=h;
  const btnDel=document.getElementById('btnDel');
  const btnLib=document.getElementById('btnLiberar');
  btnDel.style.display = (isIcal||isCap) ? 'none' : '';
  btnDel.textContent   = isFree ? 'Eliminar override' : 'Eliminar';
  btnLib.style.display = isIcal ? '' : 'none';
  document.getElementById('viewOv').classList.add('on');
}
function closeView(){ document.getElementById('viewOv').classList.remove('on'); activeId=null; }

// ═══════════════════════════════════════════
// MODAL FORMULARIO
// ═══════════════════════════════════════════
function openForm(pid,ds){
  formType='reservation';
  syncTypeBtns(); syncFormSections();
  ['fPropId','fBkId'].forEach((id,i)=>document.getElementById(id).value=i?'':pid);
  document.getElementById('fStart').value=ds;
  document.getElementById('fEnd').value=ds;
  ['fName','fPhone','fIncome','fNotes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fPlatform').value='';
  const prop=PROPS.find(p=>p.id===pid);
  document.getElementById('formTitle').textContent='Nueva reserva'+(prop?` — ${prop.name}`:'');
  document.getElementById('formOv').classList.add('on');
  setTimeout(()=>document.getElementById('fName').focus(),120);
}
function closeForm(){ document.getElementById('formOv').classList.remove('on'); }

function syncTypeBtns(){
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.toggle('on', b.dataset.t===formType));
  document.getElementById('fType').value=formType;
}
function syncFormSections(){
  const show=formType==='reservation';
  document.getElementById('guestSec').style.display=show?'':'none';
  document.getElementById('incomeSec').style.display=show?'':'none';
}

async function guardar(){
  const pid  =document.getElementById('fPropId').value;
  const bkId =document.getElementById('fBkId').value;
  const s    =document.getElementById('fStart').value;
  const e    =document.getElementById('fEnd').value;
  const name =document.getElementById('fName').value.trim();
  if(!s||!e){ alert('Ingresa las fechas de entrada y salida.'); return; }
  if(s>e){ alert('La salida debe ser después de la entrada.'); return; }
  if(formType==='reservation'&&!name){ alert('Ingresa el nombre del huésped.'); return; }
  if(hasOverlap(pid,s,e,bkId||null)){ alert('Ya existe una reserva o bloqueo en esas fechas para esta propiedad.'); return; }
  const bk={
    pid, type:formType, name,
    phone:   document.getElementById('fPhone').value.trim(),
    s, e,
    income:  parseFloat(document.getElementById('fIncome').value)||0,
    platform:document.getElementById('fPlatform').value,
    notes:   document.getElementById('fNotes').value.trim(),
  };
  try {
    if(bkId){ await api('PUT',`/api/bookings/${bkId}`,{...bk,id:bkId}); }
    else     { await api('POST','/api/bookings',bk); }
    await refreshBookings();
    closeForm(); renderCal();
  } catch(err){ alert('Error al guardar: '+err.message); }
}

async function eliminar(id){
  if(!confirm('¿Eliminar esta reserva?')) return;
  try {
    await api('DELETE',`/api/bookings/${id}`);
    await refreshBookings();
    closeView(); renderCal();
  } catch(err){ alert('Error al eliminar: '+err.message); }
}

// ═══════════════════════════════════════════
// SYNC STATUS (header chip)
// ═══════════════════════════════════════════
async function updateSyncChip(){
  try {
    const st=await api('GET','/api/sync/status');
    const chip=document.getElementById('syncChip');
    sources=st.sources||[];

    // Si hay un nuevo sync completado (automático cada 5 min), refrescar el calendario
    if(st.lastRun && st.lastRun !== _lastSyncRun && !st.running){
      _lastSyncRun = st.lastRun;
      await refreshBookings();
      renderCal();
    }

    if(st.running){
      chip.className='sync-chip running';
      chip.innerHTML='<span class="spin">🔄</span> Sincronizando…';
    } else if(!sources.length){
      chip.className='sync-chip idle';chip.textContent='⏸ Sin fuentes';
    } else {
      const anyErr=sources.some(s=>s.lastStatus==='error'||s.lastStatus==='partial');
      const allOk=sources.every(s=>s.lastStatus==='ok');
      if(anyErr){ chip.className='sync-chip err'; chip.textContent='⚠ Error en sync'; }
      else if(allOk&&st.lastRun){
        chip.className='sync-chip ok';
        chip.textContent=`✓ Sync ${fmtTime(st.lastRun)}`;
      } else { chip.className='sync-chip idle'; chip.textContent='⏸ Sin sync'; }
    }
  } catch{ /* servidor no disponible */ }
}

  inf.textContent = last ? `Última sincronización: ${fmtTime(last.lastSync)}` : 'Sin sincronizaciones recientes';
}

function renderSettingsTab(){
  document.querySelectorAll('.stab').forEach(b=>b.classList.toggle('on',b.dataset.tab===settingsTab));
  if(settingsTab==='import') renderImportTab();
  else renderExportTab();
}

// ── TAB IMPORTAR ─────────────────────────
function renderImportTab(){
  const propOpts = DESTINATIONS.map(dest=>{
    const ps=PROPS.filter(p=>p.dest===dest);
    return `<optgroup label="${dest}">${
      ps.map(p=>`<option value="${p.id}">${p.name}${p.group?' ('+p.group+')':''}</option>`).join('')
    }</optgroup>`;
  }).join('');

  // Agrupar fuentes por propiedad (1ª propId como clave)
  const MAJOR_PLATS = ['Airbnb','Booking.com','VRBO','Expedia'];
  const grouped = {};
  sources.forEach(src=>{
    const ids = src.propIds && src.propIds.length ? src.propIds : [src.propId];
    const key = ids[0];
    if(!grouped[key]) grouped[key]=[];
    grouped[key].push(src);
  });
  const srcRows = Object.keys(grouped).length
    ? Object.entries(grouped).map(([key,srcs])=>{
        const prop = PROPS.find(p=>p.id===key);
        const propName = prop ? prop.name : key;
        const propDest = prop ? `${prop.dest}${prop.group?' · '+prop.group:''}` : '';
        const srcRowsHtml = srcs.map(src=>{
          const ids = src.propIds && src.propIds.length ? src.propIds : [src.propId];
          const uds = src.unidades || ids.length;
          const extraProps = ids.slice(1).map(pid=>{ const p=PROPS.find(x=>x.id===pid); return p?p.name:pid; }).join(', ');
          let status='';
          if(src.lastStatus==='ok')
            status=`<span class="si-ok" title="${src.importedCount||0} eventos">✓ ${fmtTime(src.lastSync)} (${src.importedCount||0})</span>`;
          else if(src.lastStatus==='partial')
            status=`<span class="si-err" title="${src.lastError||'Algunas URLs fallaron'}">⚠ Parcial</span>`;
          else if(src.lastStatus==='error')
            status=`<span class="si-err" title="${src.lastError}">✗ Error</span>`;
          else
            status=`<span class="si-pend">Pendiente</span>`;
          // URLs: mostrar todas si hay varias, si no la única
          const srcUrls = src.urls && src.urls.length > 1 ? src.urls : [src.url];
          const urlsHtml = `<div class="si-url-stack">${srcUrls.map(u=>`<span class="si-url" title="${u}">${u}</span>`).join('')}</div>`;
          return `<div class="src-item">
            ${uds>1?`<span class="si-units">${uds} uds.${extraProps?' + '+extraProps:''}</span>`:''}

async function addSource(){
  const unidades = parseInt(document.getElementById('srcUnidades').value)||1;
  const platform = document.getElementById('srcPlatform').value;

  const prop1 = document.getElementById('srcProp1').value;
  const url1  = document.getElementById('srcUrl1').value.trim();
  const prop2 = unidades>=2 ? (document.getElementById('srcProp2')?.value||'') : '';
  const url2  = unidades>=2 ? (document.getElementById('srcUrl2')?.value.trim()||'') : '';
  const prop3 = unidades>=3 ? (document.getElementById('srcProp3')?.value||'') : '';
  const url3  = unidades>=3 ? (document.getElementById('srcUrl3')?.value.trim()||'') : '';

  if(!prop1)                          { alert('Selecciona la 1ª unidad.'); return; }
  if(!url1||!url1.startsWith('http')) { alert('Ingresa una URL válida para la 1ª unidad.'); return; }
  if(unidades>=2&&!prop2)             { alert('Selecciona la 2ª unidad.'); return; }
  if(unidades>=2&&(!url2||!url2.startsWith('http'))) { alert('Ingresa una URL válida para la 2ª unidad.'); return; }
  if(unidades>=3&&!prop3)             { alert('Selecciona la 3ª unidad.'); return; }
  if(unidades>=3&&(!url3||!url3.startsWith('http'))) { alert('Ingresa una URL válida para la 3ª unidad.'); return; }

  const propIds = [prop1];
  const urls    = [url1];
  if(unidades>=2){ propIds.push(prop2); urls.push(url2); }
  if(unidades>=3){ propIds.push(prop3); urls.push(url3); }

  try {
    const src=await api('POST','/api/ical-sources',{
      propId: prop1, propIds, unidades, platform,
      url: urls[0],   // campo legacy — siempre igual a la 1ª URL
      urls,
    });
    sources.push(src);
    renderImportTab();
    updateSSettingsInfo();
    await updateSyncChip();
  } catch(err){ alert('Error al agregar fuente: '+err.message); }
}

window.debugSource = async function(id){
  const btn = event.target;
  btn.disabled=true; btn.textContent='⏳';
  try {
    const r = await api('POST', `/api/sync/debug/${id}`);
    // Construir reporte legible
    const lines = [];
    lines.push(`=== DIAGNÓSTICO iCal: ${r.source.platform||'(sin plataforma)'} ===`);
    const diagUrls = r.source.urls && r.source.urls.length>1 ? r.source.urls : [r.source.url];
    diagUrls.forEach((u,i)=>lines.push(`URL${diagUrls.length>1?' '+(i+1):''}: ${u}`));
    lines.push(`Propiedad(es): ${r.source.propIds.join(', ')}`);
    lines.push('');
    lines.push('--- Pasos ---');
    (r.report?.steps||[]).forEach(s=>lines.push((s.ok?'✓':'✗')+' '+s.msg));
    lines.push('');
    lines.push(`--- Bloques creados en este sync: ${r.eventsCreated} ---`);
    (r.report?.blocks||[]).forEach(b=>lines.push(`  ${b.pid}: "${b.summary}" ${b.s} → ${b.e}`));
    lines.push('');
    lines.push(`--- Bloques ya en DB para esta fuente: ${r.blocksAlreadyInDB} ---`);
    (r.blocksInDB||[]).forEach(b=>lines.push(`  ${b.pid}: "${b.name}" ${b.s} → ${b.e}`));
    if(r.result?.lastError){
      lines.push('');
      lines.push('ERROR: '+r.result.lastError);
    }
    alert(lines.join('\n'));
    // Refrescar calendario con los nuevos datos
    await refreshBookings();
    renderCal();
    renderSettingsTab();
    updateSSettingsInfo();
    await updateSyncChip();
  } catch(err){ alert('Error en diagnóstico: '+err.message); }
  finally { btn.disabled=false; btn.textContent='🔍'; }
};

window.removeSource = async function(id){
  if(!confirm('¿Eliminar esta fuente? También se eliminarán sus bloques importados.')) return;
  try {
    await api('DELETE',`/api/ical-sources/${id}`);
    sources=sources.filter(s=>s.id!==id);
    await refreshBookings();
    renderImportTab();
    renderCal();
    updateSSettingsInfo();
    await updateSyncChip();
  } catch(err){ alert('Error: '+err.message); }
};

// DRAG HELPERS
// ═══════════════════════════════════════════
function updateDragHighlight(){
  const s   = drag.startDs <= drag.curDs ? drag.startDs : drag.curDs;
  const end = drag.startDs <= drag.curDs ? drag.curDs   : drag.startDs;
  // Rango vertical: índice de propiedad en el array PROPS (orden del calendario)
  const si  = PROPS.findIndex(p=>p.id===drag.startPid);
  const ci  = PROPS.findIndex(p=>p.id===drag.curPid);
  const lo  = Math.min(si,ci), hi = Math.max(si,ci);
  document.querySelectorAll('.dc').forEach(dc=>{
    const pi = PROPS.findIndex(p=>p.id===dc.dataset.pid);
    const ok = !dc.dataset.bk && dc.dataset.ds>=s && dc.dataset.ds<=end && pi>=lo && pi<=hi;
    dc.classList.toggle('drag-sel', ok);
  });
}
function clearDragHighlight(){
  document.querySelectorAll('.dc.drag-sel').forEach(dc=>dc.classList.remove('drag-sel'));
}

async function guardarMultiBlock(){
  const s     = document.getElementById('mbStart').value;
  const e     = document.getElementById('mbEnd').value;
  const type  = document.getElementById('mbType').value;
  const notes = document.getElementById('mbNotes').value.trim();

  if(!s||!e)   { alert('Ingresa las fechas de entrada y salida.'); return; }
  if(s>e)      { alert('La salida debe ser después de la entrada.'); return; }

  const name = type==='reservation' ? document.getElementById('mbName').value.trim() : '';
  if(type==='reservation'&&!name){ alert('Ingresa el nombre del huésped.'); return; }

  const checked = [...document.querySelectorAll('input[name="mbProp"]:checked')].map(cb=>cb.value);
  if(!checked.length){ alert('Selecciona al menos una propiedad.'); return; }

  const conflicts = checked.filter(pid=>hasOverlap(pid,s,e,null));
  if(conflicts.length){
    const names = conflicts.map(pid=>PROPS.find(p=>p.id===pid)?.name||pid).join(', ');
    if(!confirm(`Ya hay bloqueos/reservas en esas fechas para:\n${names}\n\n¿Continuar solo con las propiedades disponibles?`)) return;
  }
  const toCreate = checked.filter(pid=>!hasOverlap(pid,s,e,null));
  if(!toCreate.length){ alert('Todas las propiedades seleccionadas tienen conflictos en esas fechas.'); return; }

  const btn = document.getElementById('btnMultiBlockGuardar');
  const origTxt = btn.textContent;
  btn.disabled=true; btn.textContent='Guardando…';

  try {
    for(const pid of toCreate){
      await api('POST','/api/bookings',{
        pid, type,
        name:  type==='reservation'?name:'',
        phone: type==='reservation'?(document.getElementById('mbPhone').value.trim()):'',
        s, e,
        income: type==='reservation'?(parseFloat(document.getElementById('mbIncome').value)||0):0,
        platform: type==='reservation'?document.getElementById('mbPlatform').value:'',
        notes,
      });
    }
    await refreshBookings();
    closeMultiBlock();
    renderCal();
  } catch(err){ alert('Error al guardar: '+err.message); }
  finally { btn.disabled=false; btn.textContent=origTxt; }
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
async function init(){
  const n=new Date(); curY=n.getFullYear(); curM=n.getMonth();
  updateLabel();

  try { await refreshBookings(); }
  catch(e){ console.error('Error cargando reservas:', e); bookings=[]; }
  renderCal();
  await updateSyncChip();

  setTimeout(()=>{
    const t=document.querySelector('.day-th.today-col');
    if(t) t.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  },200);

  // Actualizar chip cada 30 s
  setInterval(updateSyncChip, 30000);

  // Navegación
  document.getElementById('btnPrev').addEventListener('click',()=>goMonth(-1));
  document.getElementById('btnNext').addEventListener('click',()=>goMonth(1));
  document.getElementById('btnHoy').addEventListener('click',goHoy);

  // Settings
  document.getElementById('btnSettings').addEventListener('click', openSettings);
  document.getElementById('settingsClose').addEventListener('click', closeSettings);
  document.getElementById('settingsCerrar').addEventListener('click', closeSettings);
  document.getElementById('settingsOv').addEventListener('click',e=>{if(e.target===e.currentTarget)closeSettings();});

  document.getElementById('stabs').addEventListener('click',e=>{
    const tab=e.target.dataset.tab;
    if(tab){ settingsTab=tab; renderSettingsTab(); }
  });

  document.getElementById('btnSyncNow').addEventListener('click', async()=>{
    const btn=document.getElementById('btnSyncNow');
    btn.disabled=true; btn.textContent='🔄 Sincronizando…';
    try {
      // POST /api/sync ahora espera a que el sync termine antes de responder
      const resp=await api('POST','/api/sync');
      if(resp && resp.lastRun)  _lastSyncRun=resp.lastRun;
      if(resp && resp.sources)  sources=resp.sources;
      await refreshBookings();
      renderCal();
      renderSettingsTab();
      updateSSettingsInfo();
      await updateSyncChip();
    } catch(err){ alert('Error al sincronizar: '+err.message); }
    btn.disabled=false; btn.textContent='🔄 Sincronizar ahora';
  });

  document.getElementById('btnDebugLog').addEventListener('click', ()=>{
    window.open('/api/sync/debug', '_blank');
  });

  // ── Botón Sync en el header ───────────────
  document.getElementById('btnSyncHdr').addEventListener('click', async()=>{
    const btn=document.getElementById('btnSyncHdr');
    btn.disabled=true; btn.textContent='🔄…';
    try {
      const resp=await api('POST','/api/sync');
      if(resp?.lastRun) _lastSyncRun=resp.lastRun;
      if(resp?.sources) sources=resp.sources;
      await refreshBookings(); renderCal(); await updateSyncChip();
    } catch(err){ alert('Error al sincronizar: '+err.message); }
    btn.disabled=false; btn.textContent='🔄 Sync';
  });

  // ── Modal bloqueo múltiple ─────────────────
  document.getElementById('multiBlockClose').addEventListener('click', closeMultiBlock);
  document.getElementById('btnMultiBlockCerrar').addEventListener('click', closeMultiBlock);
  document.getElementById('multiBlockOv').addEventListener('click',e=>{if(e.target===e.currentTarget)closeMultiBlock();});
  document.getElementById('btnMultiBlockGuardar').addEventListener('click', guardarMultiBlock);

  // ── Drag to select range ───────────────────
  const calShellEl = document.getElementById('calShell');
  calShellEl.addEventListener('mousedown',e=>{
    const dc=e.target.closest('.dc');
    if(!dc||!dc.dataset.ds||!dc.dataset.pid||dc.dataset.bk) return;
    e.preventDefault();
    drag={on:true,startDs:dc.dataset.ds,curDs:dc.dataset.ds,startPid:dc.dataset.pid,curPid:dc.dataset.pid,moved:false};
    calShellEl.classList.add('dragging');
    updateDragHighlight();
  });
  calShellEl.addEventListener('mousemove',e=>{
    if(!drag.on) return;
    const dc=e.target.closest('.dc');
    if(!dc||!dc.dataset.ds||!dc.dataset.pid) return;
    if(dc.dataset.ds!==drag.curDs||dc.dataset.pid!==drag.curPid){
      drag.moved=true; drag.curDs=dc.dataset.ds; drag.curPid=dc.dataset.pid;
      updateDragHighlight();
    }
  });
  document.addEventListener('mouseup',()=>{
    if(!drag.on) return;
    drag.on=false;
    calShellEl.classList.remove('dragging');
    if(drag.moved && (drag.startDs!==drag.curDs||drag.startPid!==drag.curPid)){
      suppressClick=true;
      setTimeout(()=>{ suppressClick=false; },100);
      const s   = drag.startDs<=drag.curDs ? drag.startDs : drag.curDs;
      const end = drag.startDs<=drag.curDs ? drag.curDs   : drag.startDs;
      const si  = PROPS.findIndex(p=>p.id===drag.startPid);
      const ci  = PROPS.findIndex(p=>p.id===drag.curPid);
      const lo  = Math.min(si,ci), hi = Math.max(si,ci);
      const pids = PROPS.slice(lo, hi+1).map(p=>p.id);
      clearDragHighlight();
      openMultiBlock(pids, s, end);
    } else {
      clearDragHighlight();
    }
  });

  // ── Touch (iPad / móvil): tap abre formulario, long-press+drag selecciona rango ──
  let touchTimer=null, touchLong=false, touchStartEl=null, touchStartX=0, touchStartY=0;

  calShellEl.addEventListener('touchstart',e=>{
    const t=e.touches[0];
    const dc=document.elementFromPoint(t.clientX,t.clientY)?.closest('.dc');
    if(!dc||!dc.dataset.ds||!dc.dataset.pid) return;
    touchLong=false; touchStartEl=dc; touchStartX=t.clientX; touchStartY=t.clientY;
    touchTimer=setTimeout(()=>{
      touchLong=true;
      if(!dc.dataset.bk){
        drag={on:true,startDs:dc.dataset.ds,curDs:dc.dataset.ds,startPid:dc.dataset.pid,curPid:dc.dataset.pid,moved:false};
        calShellEl.classList.add('dragging');
        updateDragHighlight();
        if(navigator.vibrate) navigator.vibrate(40);
      }
    },500);
  },{passive:true});

  calShellEl.addEventListener('touchmove',e=>{
    const t=e.touches[0];
    if(touchLong&&drag.on){
      e.preventDefault();
      const el=document.elementFromPoint(t.clientX,t.clientY)?.closest('.dc');
      if(el&&el.dataset.ds&&el.dataset.pid&&(el.dataset.ds!==drag.curDs||el.dataset.pid!==drag.curPid)){
        drag.moved=true; drag.curDs=el.dataset.ds; drag.curPid=el.dataset.pid;
        updateDragHighlight();
      }
    } else if(touchTimer&&Math.hypot(t.clientX-touchStartX,t.clientY-touchStartY)>8){
      clearTimeout(touchTimer); touchTimer=null;
    }
  },{passive:false});

  calShellEl.addEventListener('touchend',e=>{
    clearTimeout(touchTimer); touchTimer=null;
    if(!touchLong) return; // tap corto → el evento click lo maneja
    touchLong=false; drag.on=false;
    calShellEl.classList.remove('dragging');
    suppressClick=true;
    setTimeout(()=>{ suppressClick=false; },300);
    if(drag.startDs&&drag.moved&&(drag.startDs!==drag.curDs||drag.startPid!==drag.curPid)){
      const s=drag.startDs<=drag.curDs?drag.startDs:drag.curDs;
      const end=drag.startDs<=drag.curDs?drag.curDs:drag.startDs;
      const si=PROPS.findIndex(p=>p.id===drag.startPid),ci=PROPS.findIndex(p=>p.id===drag.curPid);
      const pids=PROPS.slice(Math.min(si,ci),Math.max(si,ci)+1).map(p=>p.id);
      clearDragHighlight();
      openMultiBlock(pids,s,end);
    } else {
      clearDragHighlight();
      const dc=touchStartEl;
      if(dc){ if(dc.dataset.bk) openView(dc.dataset.bk); else if(dc.dataset.ds&&dc.dataset.pid) openForm(dc.dataset.pid,dc.dataset.ds); }
    }
    drag={on:false,startDs:null,curDs:null,startPid:null,curPid:null,moved:false};
  });

  // Fecha entrada → ajustar mínimo de salida
  document.getElementById('fStart').addEventListener('change',function(){
    const end=document.getElementById('fEnd');
    if(end.value&&end.value<this.value) end.value=this.value;
    end.min=this.value;
  });

  // Modal ver
  document.getElementById('viewClose').addEventListener('click',closeView);
  document.getElementById('btnViewCerrar').addEventListener('click',closeView);
  document.getElementById('viewOv').addEventListener('click',e=>{if(e.target===e.currentTarget)closeView();});
  document.getElementById('btnDel').addEventListener('click',()=>{if(activeId)eliminar(activeId);});
  document.getElementById('btnLiberar').addEventListener('click',()=>{
    if(activeId){ const bk=bookings.find(b=>b.id===activeId); if(bk) liberarIcalBlock(bk); }
  });

  // Modal form
  document.getElementById('formClose').addEventListener('click',closeForm);
  document.getElementById('btnFormCerrar').addEventListener('click',closeForm);
  document.getElementById('formOv').addEventListener('click',e=>{if(e.target===e.currentTarget)closeForm();});
  document.getElementById('btnGuardar').addEventListener('click',guardar);

  document.querySelectorAll('.tbtn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      formType=btn.dataset.t; syncTypeBtns(); syncFormSections();
      if(formType==='reservation') setTimeout(()=>document.getElementById('fName').focus(),60);
    });
  });

  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){ closeView(); closeForm(); closeSettings(); closeMultiBlock(); }
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
